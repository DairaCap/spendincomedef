<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Add Transaction - NeoFinance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
        .neon-gradient {
            background: linear-gradient(135deg, #ff00ff 0%, #7701d0 100%);
        }
        .glass-card {
            background: #1A1D23;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.4);
        }
        .inset-input {
            background: #101319;
            box-shadow: inset 0px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#6700b5",
                    "surface-container-highest": "#32353b",
                    "primary-container": "#ff00ff",

                    "surface-container-high": "#272a30",
                    "primary-fixed": "#ffd7f5",

                    "on-tertiary-container": "#452100",
                    "outline-variant": "#564052",
                    "surface-container": "#1d2026",
                    "on-primary-fixed": "#380038",
                    "surface-container-low": "#191c22",
                    "on-error": "#690005",
                    "background": "#101319",
                    "secondary-fixed": "#efdbff",
                    "surface-tint": "#ffabf3",
                    "primary-fixed-dim": "#ffabf3",
                    "tertiary-fixed-dim": "#ffb77d",
                    "tertiary": "#ffb77d",
                    "on-surface": "#e1e2ea",
                    "on-error-container": "#ffdad6",
                    "secondary": "#dcb8ff",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "surface-dim": "#101319",
                    "surface": "#101319",
                    "on-tertiary": "#4d2600",
                    "surface-container-lowest": "#0b0e14",
                    "on-background": "#e1e2ea",
                    "secondary-container": "#7701d0",
                    "outline": "#a4899d",
                    "surface-bright": "#363940",
                    "on-tertiary-fixed": "#2f1500",
                    "surface-variant": "#32353b"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid-columns-desktop": "12",
                    "section-gap": "32px",
                    "grid-columns-mobile": "4",
                    "container-margin": "20px",
                    "stack-gap": "16px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "title-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],

                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"]

            "fontSize": {

                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background text-primary font-title-md text-title-md z-50">
<div class="flex justify-between items-center px-container-margin py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high border-2 border-primary/20">
<img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGYeUtRKOEFFly9FnfFO1QKfJtg_sE92aRSR_axUHxXuWi43S4N0Gv2_H7L3IPXlwBoq0eqiHiN8PU73TomPiiNJJXFFonaaFNa00QXC3HarCVDncZN1544N3qtSo5eTrt56G1Ne3Aj6viGE6z3svQ-AEsjfpARtl3rCi6Sj_nf78ipL4M_EHr4Wf68qsIodIk_KV8Jw3U3gPC30a-tq3QP8NLTnPXQV1Sah_VnD-ky60aSXGBOo_rnaOUC3OIYOg36GbNGBa9zlo"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">New Entry</h1>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity tap-highlight-none active:scale-95">settings</button>
</div>
</header>
<main class="px-container-margin mt-8 flex flex-col gap-section-gap max-w-lg mx-auto">
<!-- Transaction Type Toggle -->
<div class="glass-card rounded-lg p-2 flex gap-2">
<button class="flex-1 py-3 rounded-DEFAULT font-label-caps text-label-caps transition-all duration-300 bg-primary-container text-on-primary-container" id="btn-expense" onclick="setType('expense')">EXPENSE</button>
<button class="flex-1 py-3 rounded-DEFAULT font-label-caps text-label-caps transition-all duration-300 text-on-surface-variant hover:bg-surface-container" id="btn-income" onclick="setType('income')">INCOME</button>
<button class="flex-1 py-3 rounded-DEFAULT font-label-caps text-label-caps transition-all duration-300 text-on-surface-variant hover:bg-surface-container" id="btn-sub" onclick="setType('sub')">SUBSCRIPTION</button>
</div>
<!-- Amount Field -->
<section class="flex flex-col items-center gap-2">
<label class="font-label-caps text-label-caps text-outline uppercase tracking-widest">Amount</label>
<div class="flex items-baseline gap-1">
<span class="font-display-lg text-display-lg text-primary">$</span>
<input autofocus="" class="bg-transparent border-none text-center font-display-lg text-display-lg text-on-surface focus:ring-0 w-full max-w-[240px] placeholder:text-surface-container-highest" placeholder="0.00" step="0.01" type="number"/>
</div>
</section>
<!-- Form Fields -->
<div class="flex flex-col gap-stack-gap">
<!-- Title -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2">Description</label>
<div class="glass-card p-1 rounded-lg">
<input class="w-full inset-input border-none rounded-DEFAULT py-4 px-4 font-body-lg text-body-lg text-on-surface placeholder:text-surface-container-highest focus:ring-2 focus:ring-primary/30" placeholder="e.g. Monthly Rent" type="text"/>
</div>
</div>
<!-- Date & Category Grid -->
<div class="grid grid-cols-2 gap-stack-gap">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2">Date</label>
<div class="glass-card p-1 rounded-lg">
<input class="w-full inset-input border-none rounded-DEFAULT py-4 px-4 font-body-sm text-body-sm text-on-surface focus:ring-2 focus:ring-primary/30 [color-scheme:dark]" type="date"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2">Category</label>
<div class="glass-card p-1 rounded-lg">
<select class="w-full inset-input border-none rounded-DEFAULT py-4 px-4 font-body-sm text-body-sm text-on-surface focus:ring-2 focus:ring-primary/30 appearance-none">
<option>Lifestyle</option>
<option>Utilities</option>
<option>Food &amp; Drink</option>
<option>Health</option>
<option>Transport</option>
</select>
</div>
</div>
</div>
<!-- Attach Receipt (Atmospheric) -->
<div class="glass-card p-6 rounded-lg border-2 border-dashed border-outline-variant/30 flex flex-col items-center gap-3 cursor-pointer hover:border-primary/50 transition-colors group">
<span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-primary transition-colors">add_a_photo</span>
<p class="font-label-caps text-label-caps text-on-surface-variant">Attach receipt or invoice</p>
</div>
</div>
<!-- Submit Button -->
<button class="neon-gradient w-full py-5 rounded-lg font-title-md text-title-md text-on-primary font-bold shadow-lg shadow-primary/20 active:scale-95 transition-transform mt-4 flex items-center justify-center gap-2 group">
<span>Confirm Transaction</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface/80 backdrop-blur-xl shadow-[0px_-20px_40px_rgba(0,0,0,0.4)] rounded-t-lg">
<button class="flex flex-col items-center justify-center text-outline-variant hover:text-primary-fixed transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">grid_view</span>
</button>
<button class="flex flex-col items-center justify-center text-outline-variant hover:text-primary-fixed transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">contactless_off</span>
</button>
<button class="flex flex-col items-center justify-center text-primary relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-primary after:rounded-full active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined">home</span>
</button>
<button class="flex flex-col items-center justify-center text-outline-variant hover:text-primary-fixed transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">receipt_long</span>
</button>
<button class="flex flex-col items-center justify-center text-outline-variant hover:text-primary-fixed transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">calendar_today</span>
</button>
</nav>
<script>
        function setType(type) {
            const expense = document.getElementById('btn-expense');
            const income = document.getElementById('btn-income');
            const sub = document.getElementById('btn-sub');
            const buttons = [expense, income, sub];
            
            buttons.forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                btn.classList.add('text-on-surface-variant', 'hover:bg-surface-container');
            });

            const active = document.getElementById(`btn-${type}`);
            active.classList.add('bg-primary-container', 'text-on-primary-container');
            active.classList.remove('text-on-surface-variant', 'hover:bg-surface-container');
            
            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Set default date to today
        document.querySelector('input[type="date"]').valueAsDate = new Date();
    </script>
</body></html>
